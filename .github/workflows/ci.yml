# Bootstrap CI for opendbx — Stage 0
# 完整 7 job 流水线在 spec-0.9-ci-github-actions 中正式定稿。
# spec-0.2 阶段：4 → 7 jobs（追加 import-check / dep-check / cli-golden）。
#
# Design: opendbrb/docs/cicd-and-methodology.md § 3,
#         opendbrb/specs/stage-0/spec-0.2-go-module-layout.md § 7 DoD

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.25'

jobs:
  validate:
    name: Validate (lint / fmt / vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt failed for: $out"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: go mod tidy clean
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "go.mod/go.sum dirty after tidy"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2
          args: --timeout 5m

  build:
    name: Build (matrix)
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: make build
      - name: CGO_ENABLED=0 smoke build (spec § 3.3)
        run: CGO_ENABLED=0 go build -o /tmp/opendbx-cgo0 ./cmd/opendbx
      - name: Smoke test --version
        run: ./bin/opendbx --version
      - name: Smoke test interact stub
        run: |
          out=$(./bin/opendbx interact)
          echo "$out" | grep -q "not yet implemented" || (echo "stub did not print expected text"; exit 1)

  test:
    name: Unit Test (race + cover)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
        continue-on-error: true

  import-check:
    name: Import Rules Check (spec-0.2 D-5)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build import-rules-check
        run: go build -o /tmp/import-rules-check ./tools/import-rules-check
      - name: Run import-rules-check
        run: /tmp/import-rules-check -v .
      - name: Run import-rules-check unit tests
        run: go test -race ./tools/import-rules-check/...

  dep-check:
    name: Dep Allowlist Check (spec-0.2 D-6)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build dep-allowlist-check
        run: go build -o /tmp/dep-allowlist-check ./tools/dep-allowlist-check
      - name: Run dep-allowlist-check
        run: /tmp/dep-allowlist-check -v .
      - name: Run dep-allowlist-check unit tests
        run: go test -race ./tools/dep-allowlist-check/...

  cli-golden:
    name: CLI Text Golden (spec-0.2 D-3)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run CLI golden tests
        run: go test -race -run 'TestGolden|TestSubcommandStubs' ./cmd/opendbx/...
      - name: Verify goldens are committed (no drift)
        run: |
          TEST_UPDATE_GOLDEN=1 go test -run TestGolden ./cmd/opendbx/...
          if ! git diff --exit-code cmd/opendbx/testdata/golden/; then
            echo "CLI golden files differ from current run output. Either:"
            echo "  - Update goldens locally: TEST_UPDATE_GOLDEN=1 go test -run TestGolden ./cmd/opendbx/..."
            echo "  - Or fix the change so output matches existing golden."
            exit 1
          fi
