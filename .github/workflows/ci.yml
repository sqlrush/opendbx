# opendbx CI — spec-0.9 D-1 (final state after T-9)
#
# 9 stable-name required jobs (validate / build-linux / build-macos /
# unit-test / import-rules / dependency-policy / cli-golden / security /
# perf-smoke). All branch protection contexts reference these stable names
# 1:1 (scripts/ci/branch-protection-required-checks.json SSOT enforced by
# tools/ci-protection-check; see `make ci-script-check`).
#
# T-5 / T-7 / T-8 / T-9 history (兼容 PR 模式):
#   T-5: 17 jobs (9 stable + 8 legacy placeholders) shipped in one PR;
#        old branch protection still gated on legacy contexts.
#   T-7: sync-branch-protection.sh + ci-protection-check tool shipped.
#   T-8: protection PATCH'd to require new 9 stable contexts.
#   T-9: legacy placeholders deleted (this file's current state).
#
# Design refs:
# - spec-0.9-ci-github-actions.md § 2.1 stable-rename matrix
# - spec-0.9-ci-github-actions.md § 2.2 ci.yml scaffold
# - spec-0.9-ci-github-actions.md § 3.1 (T-5 兼容 PR 模式) + § 3.2
# - spec-0.9-ci-github-actions.md § 7 DoD + § 9 timeline

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:                       # R2 codex MED / claude HIGH-3: 保留手动重跑

env:
  GO_VERSION: '1.23'                       # R2 codex CRIT-1: align go.mod (was 1.22 in R1 draft)

# R2 codex HIGH-7: PR 用 ref 同 group → cancel-in-progress；
# main push 用 run_id 让每个 run 独立 group 不互 cancel（防 burst 丢 pending run）.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read                           # R2 codex MED-1: 顶层最小化；security job 自行 elevate

# =============================================================================
# 9 stable-name required jobs (REAL work — T-8 cutover 后 protection 引用这些)
# =============================================================================

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt check (spec-0.1 D-2)
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt failed for: $out"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: go mod tidy clean
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2
          args: --timeout 5m
      # R2 codex HIGH-4: shellcheck pre-push hook 不丢，移入 validate job
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends shellcheck
      - name: shellcheck git-hooks/pre-push (spec-0.7 D-5)
        run: shellcheck git-hooks/pre-push

  build-linux:
    name: build-linux
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build (spec-0.1 D-2)
        run: make build
      - name: CGO_ENABLED=0 smoke build (spec § 3.3)
        run: CGO_ENABLED=0 go build -o /tmp/opendbx-cgo0 ./cmd/opendbx
      - name: Smoke test --version
        run: ./bin/opendbx --version
      - name: Smoke test interact stub
        run: |
          out=$(./bin/opendbx interact)
          echo "$out" | grep -q "not yet implemented" || (echo "stub did not print expected text"; exit 1)

  build-macos:
    name: build-macos
    runs-on: macos-latest
    needs: validate
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: make build

  # R2 codex NIT-3: unit-test 不留"同形"，具体 step 完整化。
  # R2 codex HIGH-4: git-hooks go-test 也在此 job (pre-push-hook 合并入).
  unit-test:
    name: unit-test
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests with race + coverage
        run: go test -race -coverprofile=coverage.out ./...
      - name: Run coverage-gate (spec-0.8 D-1)
        run: go run ./tools/coverage-gate -profile=coverage.out
      - name: Run git-hooks test suite (spec-0.7 D-5)
        run: cd git-hooks/test && go test -race ./...
      - name: Upload coverage artifact
        if: ${{ always() && hashFiles('coverage.out') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-out
          path: coverage.out
          retention-days: 30

  import-rules:
    name: import-rules
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build import-rules-check (spec-0.2 D-5)
        run: go build -o /tmp/import-rules-check ./tools/import-rules-check
      - name: Run import-rules-check
        run: /tmp/import-rules-check -v .
      - name: Run import-rules-check unit tests
        run: go test -race ./tools/import-rules-check/...

  dependency-policy:
    name: dependency-policy
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build dep-allowlist-check (spec-0.2 D-6)
        run: go build -o /tmp/dep-allowlist-check ./tools/dep-allowlist-check
      - name: Run dep-allowlist-check
        run: /tmp/dep-allowlist-check -v .
      - name: Run dep-allowlist-check unit tests
        run: go test -race ./tools/dep-allowlist-check/...

  cli-golden:
    name: cli-golden
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run CLI golden tests (spec-0.2 D-3)
        run: go test -race -run 'TestGolden|TestSubcommandStubs' ./cmd/opendbx/...
      - name: Verify goldens are committed (no drift)
        run: |
          TEST_UPDATE_GOLDEN=1 go test -run TestGolden ./cmd/opendbx/...
          if ! git diff --exit-code cmd/opendbx/testdata/golden/; then
            echo "CLI golden files differ from current run output. Either:"
            echo "  - Update goldens locally: TEST_UPDATE_GOLDEN=1 go test -run TestGolden ./cmd/opendbx/..."
            echo "  - Or fix the change so output matches existing golden."
            exit 1
          fi

  # spec-0.9 T-3 / D-2: security job — gosec + SARIF + (T-3.5) vuln-allowlist
  security:
    name: security
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run gosec
        id: gosec
        continue-on-error: true
        uses: securego/gosec@v2.21.4
        with:
          args: '-quiet -fmt=sarif -out=gosec.sarif ./...'
      - name: Upload SARIF to GitHub Security tab
        if: ${{ always() && hashFiles('gosec.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
      - name: Upload SARIF artifact (forensic)
        if: ${{ always() && hashFiles('gosec.sarif') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: gosec-sarif
          path: gosec.sarif
          retention-days: 30
      - name: Fail if gosec found issues
        if: ${{ steps.gosec.outcome == 'failure' }}
        run: |
          echo "gosec reported issues (see GH Security tab + gosec-sarif artifact)"
          exit 1
      - name: Run vuln-check (govulncheck + OSV allowlist)
        run: make vuln-check

  # spec-0.9 T-4 / D-3: perf-smoke — make bench WARN-only
  perf-smoke:
    name: perf-smoke
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: "Run bench (spec-0.8 D-2 WARN-only; BENCH_WARN stderr 信号)"
        run: make bench
      - name: Upload bench.out artifact
        if: ${{ always() && hashFiles('bench.out') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: bench-output
          path: bench.out
          retention-days: 30

