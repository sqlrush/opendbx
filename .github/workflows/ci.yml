# Bootstrap CI for opendbx — Stage 0
# 完整 7 job 流水线在 spec-0.9-ci-github-actions 中正式定稿。
# spec-0.2 阶段：4 → 7 jobs（追加 import-check / dep-check / cli-golden）。
#
# Design: opendbrb/docs/cicd-and-methodology.md § 3,
#         opendbrb/specs/stage-0/spec-0.2-go-module-layout.md § 7 DoD

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.23'

jobs:
  validate:
    name: Validate (lint / fmt / vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt failed for: $out"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: go mod tidy clean
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "go.mod/go.sum dirty after tidy"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2
          args: --timeout 5m

  build:
    name: Build (matrix)
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: make build
      - name: CGO_ENABLED=0 smoke build (spec § 3.3)
        run: CGO_ENABLED=0 go build -o /tmp/opendbx-cgo0 ./cmd/opendbx
      - name: Smoke test --version
        run: ./bin/opendbx --version
      - name: Smoke test interact stub
        run: |
          out=$(./bin/opendbx interact)
          echo "$out" | grep -q "not yet implemented" || (echo "stub did not print expected text"; exit 1)

  test:
    name: Unit Test (race + cover)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
        continue-on-error: true

  import-check:
    name: Import Rules Check (spec-0.2 D-5)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build import-rules-check
        run: go build -o /tmp/import-rules-check ./tools/import-rules-check
      - name: Run import-rules-check
        run: /tmp/import-rules-check -v .
      - name: Run import-rules-check unit tests
        run: go test -race ./tools/import-rules-check/...

  dep-check:
    name: Dep Allowlist Check (spec-0.2 D-6)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build dep-allowlist-check
        run: go build -o /tmp/dep-allowlist-check ./tools/dep-allowlist-check
      - name: Run dep-allowlist-check
        run: /tmp/dep-allowlist-check -v .
      - name: Run dep-allowlist-check unit tests
        run: go test -race ./tools/dep-allowlist-check/...

  cli-golden:
    name: CLI Text Golden (spec-0.2 D-3)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run CLI golden tests
        run: go test -race -run 'TestGolden|TestSubcommandStubs' ./cmd/opendbx/...
      - name: Verify goldens are committed (no drift)
        run: |
          TEST_UPDATE_GOLDEN=1 go test -run TestGolden ./cmd/opendbx/...
          if ! git diff --exit-code cmd/opendbx/testdata/golden/; then
            echo "CLI golden files differ from current run output. Either:"
            echo "  - Update goldens locally: TEST_UPDATE_GOLDEN=1 go test -run TestGolden ./cmd/opendbx/..."
            echo "  - Or fix the change so output matches existing golden."
            exit 1
          fi

  pre-push-hook:
    name: pre-push hook (spec-0.7 D-5)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # stdlib-only test module; cache on go.mod.
          cache-dependency-path: git-hooks/test/go.mod
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends shellcheck
      - name: shellcheck git-hooks/pre-push
        run: shellcheck git-hooks/pre-push
      - name: Run pre-push hook test suite
        run: |
          cd git-hooks/test
          go test -race ./...

  # spec-0.9 T-3 / D-2: security job — gosec + govulncheck + SARIF upload.
  #
  # 非 required at T-3 (branch protection 不引用此 context until T-8 cutover).
  # T-3.5 后续加 vuln-allowlist 包装 (govulncheck → make vuln-check 替换).
  #
  # 设计要点 (spec-0.9 R2):
  # - gosec @v2.21.4 锁版本 (R2 codex HIGH-9: 不再 @master 防供应链漂移)
  # - govulncheck @v1.1.4 source mode (R2 codex CRIT-1: 不用 binary mode)
  # - SARIF upload `if: always()` + 末步 fail check (R2 codex HIGH-1: gosec
  #   fail 不阻断 upload step)
  # - permissions job-level scope (R2 codex MED-1: 不污染其他 job 权限)
  security:
    name: security
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      security-events: write    # SARIF upload to GH Security tab
      actions: read             # SARIF private repo 必需
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # R2 codex HIGH-1: continue-on-error 让 SARIF upload 步骤先跑;
      # 末步根据 steps.gosec.outcome 决定 fail.
      - name: Run gosec
        id: gosec
        continue-on-error: true
        uses: securego/gosec@v2.21.4
        with:
          args: '-quiet -fmt=sarif -out=gosec.sarif ./...'
      - name: Upload SARIF to GitHub Security tab
        if: ${{ always() && hashFiles('gosec.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
      - name: Upload SARIF artifact (forensic)
        if: ${{ always() && hashFiles('gosec.sarif') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: gosec-sarif
          path: gosec.sarif
          retention-days: 30
      - name: Fail if gosec found issues
        if: ${{ steps.gosec.outcome == 'failure' }}
        run: |
          echo "gosec reported issues (see GH Security tab + gosec-sarif artifact)"
          exit 1
      # govulncheck @v1.1.4 source mode (R2 codex CRIT-1 + HIGH-9 修).
      # T-3.5 后将 `govulncheck -test ./...` 替换为 `make vuln-check`
      # (vuln-allowlist 包装提供 OSV ID + expiry 豁免).
      - name: Install govulncheck v1.1.4
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Run govulncheck (source mode)
        run: govulncheck -test ./...
