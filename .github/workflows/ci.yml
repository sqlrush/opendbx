# Bootstrap CI for opendbx — Stage 0
# 完整 7 job 流水线在 spec-0.9-ci-github-actions 中正式定稿。
# 本文件仅满足 Stage 0 早期：build + test + lint 三个最小关卡，确保 push 即跑。
#
# Design: opendbrb/docs/cicd-and-methodology.md § 3

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.22'

jobs:
  validate:
    name: Validate (lint / fmt / vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt failed for: $out"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout 5m

  build:
    name: Build (matrix)
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: make build
      - name: Smoke test
        run: ./bin/opendbx --version

  test:
    name: Unit Test (race + cover)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
        continue-on-error: true
