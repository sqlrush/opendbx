# golangci-lint v2 config for opendbx
#
# spec-0.2 D-7 baseline: enables a minimal set of linters + revive
# package-naming rules. spec-0.10-lint-static-analysis will expand to the
# full ruleset.
#
# Schema reference: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - revive
    - errorlint
    - ineffassign
    - nilnil
    - unused
    - nolintlint

  settings:
    revive:
      rules:
        - name: package-comments
        - name: var-naming
        - name: exported

  exclusions:
    rules:
      # error message capitalization conventions differ in opendbx (Code/
      # Message/Hint triple — Message may start with capital noun) — disable
      # this errorlint sub-rule.
      - linters: [errorlint]
        text: "error strings should not be capitalized"
      - path: _test\.go
        linters: [goconst]
      # Stage-0 scaffolding: stub doc.go files contain only a package
      # comment + design ref; revive's "exported" rule complains about
      # packages with no exported identifiers, which is intentional here.
      - path: internal/.*/doc\.go
        linters: [revive]

formatters:
  enable:
    - gofmt
    - goimports

output:
  formats:
    text:
      path: stdout
      colors: true
